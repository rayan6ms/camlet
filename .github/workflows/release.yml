name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify build inputs
        run: pnpm verify

  build-linux:
    needs: verify
    runs-on: ubuntu-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux AppImage
        run: pnpm package:linux

      - name: Upload Linux release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: camlet-linux-release
          if-no-files-found: error
          path: |
            release/*.AppImage

  build-win:
    needs: verify
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows NSIS installer
        run: pnpm package:win

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: camlet-windows-release
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.nsis.7z

  publish-release:
    needs: [build-linux, build-win]
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          prerelease=false

          if [[ "${version}" == *-* ]]; then
            prerelease=true
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Camlet ${{ steps.release_meta.outputs.version }}
          tag_name: ${{ steps.release_meta.outputs.tag }}
          draft: false
          prerelease: ${{ steps.release_meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            release-assets/**/*.AppImage
            release-assets/**/*.exe
            release-assets/**/*.nsis.7z
