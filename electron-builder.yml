appId: io.camlet.app
productName: Camlet
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
directories:
  buildResources: assets
  output: release
files:
  - dist/renderer/**
  - dist-electron/**
  - assets/about/**
  - package.json
  - LICENSE
extraResources:
  - from: assets/icons/512x512.png
    to: icons/512x512.png
extraMetadata:
  main: dist-electron/main/index.js
asar: true
npmRebuild: false
linux:
  category: Utility
  executableName: camlet
  executableArgs:
    - --ozone-platform=x11
  icon: icons
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
  target:
    - target: AppImage
      arch:
        - x64
win:
  icon: icon.ico
  artifactName: ${productName}-${version}-windows-${arch}.${ext}
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  perMachine: false
